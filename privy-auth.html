<!DOCTYPE html>
<html>
<head>
  <title>DeskPet Privy Auth</title>
  <meta charset="utf-8">
  <style>
    :root {
      --bg-darkest: #161617;
      --bg-glass: rgba(255, 255, 255, 0.05);
      --border-glow: rgba(255, 255, 255, 0.12);
      --text-primary: #f5f5f7;
      --text-secondary: rgba(245, 245, 247, 0.6);
      --color-cyan: #0A84FF;
      --color-pink: #BF5AF2;
    }
    body {
      background: radial-gradient(circle at 50% 0%, #2c2c2e 0%, #161617 100%);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .auth-container {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-glow);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      border-radius: 18px;
      padding: 40px 30px;
      width: 380px;
      text-align: center;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-sizing: border-box;
    }
    h2 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(180deg, #ffffff 0%, #a1a1a6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
      margin-top: 0;
    }
    p {
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 24px;
      margin-top: 0;
    }
    .hud-input {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 16px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: var(--text-primary);
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
      text-align: center;
    }
    .hud-input:focus {
      border-color: var(--color-cyan);
      box-shadow: 0 0 8px rgba(10, 132, 255, 0.3);
    }
    .hud-btn {
      width: 100%;
      padding: 12px;
      background: var(--color-cyan);
      border: none;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s, background 0.2s;
      box-sizing: border-box;
    }
    .hud-btn:hover {
      opacity: 0.9;
    }
    .hud-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .glow-pink {
      background: var(--color-pink);
    }
    .status-msg {
      margin-top: 16px;
      font-size: 12px;
      color: var(--color-pink);
      min-height: 18px;
      word-wrap: break-word;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <h2>DESKPET SECURE LOGIN</h2>
    <p>Please enter your email to receive a secure OTP code.</p>
    
    <div id="email-step">
      <input type="email" id="privy-email" class="hud-input" placeholder="name@example.com">
      <button id="btn-send-code" class="hud-btn">Send Code</button>
    </div>

    <div id="code-step" class="hidden">
      <input type="text" id="privy-code" class="hud-input" placeholder="123456" maxlength="6" style="letter-spacing: 6px; font-size: 18px; font-weight: 600;">
      <button id="btn-verify-code" class="hud-btn glow-pink">Verify & Sign In</button>
    </div>

    <div id="status-msg" class="status-msg"></div>
  </div>

  <script src="config.js"></script>
  <script src="privy-sdk.min.js"></script>
  <script src="privy-auth.js"></script>
</body>
</html>

services:
  - type: web
    name: deskpet-server
    runtime: node
    region: singapore  # closest to Vietnam
    plan: starter
    rootDir: server
    buildCommand: npm ci --omit=dev
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: SUPABASE_URL
        sync: false  # Set manually in Render dashboard
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DISTRIBUTOR_SECRET
        sync: false
      - key: HELIUS_RPC_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false  # Set to your Chrome Extension ID origin
